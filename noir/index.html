<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL LANGUAGE BREAKER</title>
    <style>
        body { background: #000; color: #FFD700; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .title { font-size: 1.2rem; font-weight: 900; letter-spacing: 0.4rem; margin-bottom: 1.5rem; text-transform: uppercase; text-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
        
        /* 1. ロゴボタンの完全復活：icon.png を使用 */
        .glb-main-trigger {
            width: 260px; height: 260px;
            background: url('icon.png') no-repeat center;
            background-size: contain;
            border: none; cursor: pointer;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.3));
            transition: transform 0.1s;
            margin: 1rem 0;
            outline: none;
        }
        .glb-main-trigger:active { transform: scale(0.94); filter: drop-shadow(0 0 10px #FFD700); }

        .input-box { width: 85%; max-width: 500px; height: 100px; background: #0a0a0a; border: 2px solid #FFD700; padding: 1.2rem; color: #FFD700; font-size: 1.5rem; outline: none; border-radius: 12px; resize: none; text-align: center; }
        .result-box { width: 85%; max-width: 500px; min-height: 80px; margin-top: 1.5rem; border-left: 5px solid #FFD700; padding: 1.2rem; background: rgba(255, 215, 0, 0.05); color: #FFF; font-size: 1.4rem; }
        .footer-info { margin-top: 2rem; font-size: 0.6rem; color: #333; letter-spacing: 0.2rem; }
    </style>
</head>
<body>
    <div class="title">GLOBAL LANGUAGE BREAKER</div>
    
    <textarea class="input-box" id="userInput" placeholder="INPUT JAPANESE..."></textarea>
    
    <button class="glb-main-trigger" id="glbBtn" onclick="executeGLB()"></button>
    
    <div class="result-box" id="resultArea">READY...</div>
    <div class="footer-info">SMILE_BASE | FRIEND_BASE | NOIR_AUDIT</div>

    <script>
        async function executeGLB() {
            const text = document.getElementById('userInput').value.trim();
            const resArea = document.getElementById('resultArea');
            if(!text) return;

            resArea.style.color = "#FFD700";
            resArea.innerText = "BREAKING...";

            try {
                // 2. Smile Friend (8080) へ翻訳仕入れ試行
                const response = await fetch('http://localhost:8080/translate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text: text, mode: 'strict' })
                });
                
                const data = await response.json();
                resArea.style.color = "#FFF";
                resArea.innerText = data.result;
            } catch (e) {
                // 3. 通信エラー、あるいは無料枠終了時のオンデバイス・フォールバック
                // server.js 内の dictJaToEn ロジックをブラウザ側でもシミュレート
                resArea.style.color = "#F00";
                resArea.innerText = " USE STORED DICTIONARY";
            }
        }
    </script>
</body>
</html>
