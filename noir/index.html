<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GLB CORE</title>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        h2 { font-size: 24px; text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
        textarea { width: 100%; flex-grow: 1; background: #111; color: #fff; border: 2px solid #d4af37; border-radius: 10px; padding: 15px; font-size: 18px; box-sizing: border-box; margin-bottom: 20px; }
        button { width: 100%; height: 60px; background: #d4af37; color: #000; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; }
        #output { margin-top: 20px; padding: 15px; border-top: 1px solid #444; font-size: 18px; line-height: 1.5; color: #d4af37; min-height: 100px; }
    </style>
</head>
<body>
    <h2>GLB CORE</h2>
    <textarea id="input" placeholder="ここに日本語を入力..."></textarea>
    <button onclick="translateCore()">EXECUTE</button>
    <div id="output">READY...</div>

    <script>
        function translateCore() {
            const val = document.getElementById('input').value;
            const out = document.getElementById('output');
            if(!val) return;
            out.innerText = "Synchronizing...\n[ 思想翻訳 ]\n" + "Converting your intent to Global English...";
        }
    </script>
</body>
</html>
