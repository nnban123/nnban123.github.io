<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL LANGUAGE BREAKER</title>
    <style>
        body { background-color: #000; color: #FFD700; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .title { font-size: 1.5rem; font-weight: bold; letter-spacing: 0.2rem; margin-bottom: 2rem; }
        .input-box { width: 80%; max-width: 400px; background: #111; border: 2px solid #FFD700; padding: 1rem; color: #FFD700; font-size: 1.2rem; outline: none; margin-bottom: 2rem; border-radius: 8px; }
        .glb-btn { width: 120px; height: 120px; border-radius: 50%; background: #FFD700; border: none; font-size: 1.5rem; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); transition: transform 0.1s; }
        .glb-btn:active { transform: scale(0.95); }
        .status { margin-top: 2rem; font-size: 0.8rem; color: #555; }
        .result { margin-top: 1rem; width: 80%; max-width: 400px; font-size: 1.2rem; text-align: left; border-left: 2px solid #FFD700; padding-left: 1rem; }
    </style>
</head>
<body>
    <div class="title">GLOBAL LANGUAGE BREAKER</div>
    <input type="text" class="input-box" id="userInput" placeholder="INPUT HERE...">
    <button class="glb-btn" onclick="executeGLB()">GLB</button>
    <div class="result" id="resultArea">STATUS: READY</div>
    <div class="status">v5.5 SHADOW DEPLOYED</div>

    <script>
        async function executeGLB() {
            const text = document.getElementById('userInput').value;
            const resArea = document.getElementById('resultArea');
            if(!text) return;
            
            resArea.innerText = "BREAKING...";
            try {
                const response = await fetch('http://127.0.0.1:8080/translate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text: text, mode: 'kiwami' })
                });
                const data = await response.json();
                resArea.innerText = data.result || "ERROR";
            } catch (e) {
                resArea.innerText = "CONNECTION FAILED";
            }
        }
    </script>
</body>
</html>
