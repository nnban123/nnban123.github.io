<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GLB - TERMINAL</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .intel { background: #D4AF37; color: #000; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: none; font-weight: 900; }
        input { width: 90%; max-width: 400px; padding: 20px; background: #111; border: 1px solid #D4AF37; color: #fff; border-radius: 15px; font-size: 1.2rem; outline: none; }
        #result { margin-top: 30px; text-align: left; max-width: 400px; margin: 30px auto; color: #D4AF37; line-height: 1.8; }
    </style>
</head>
<body>
    <div id="intel-layer" class="intel">🛡️ TRAVEL MODE ACTIVE</div>
    <div style="margin-top: 50px;">
        <input type="text" id="input" placeholder="Type here..." onkeydown="if(event.key==='Enter') breakBarrier()">
        <p id="counter" style="font-size: 0.7rem; color: #555; margin-top: 10px;"></p>
    </div>
    <div id="result"></div>
    <script>
        const plan = new URLSearchParams(window.location.search).get('plan');
        const limit = (plan === 'travel' || plan === 'premium') ? 300 : 30;
        const stored = JSON.parse(localStorage.getItem('glb_intel'));
        if (plan === 'travel' && !stored) {
            const dest = prompt("Set Destination:");
            if(dest) localStorage.setItem('glb_intel', JSON.stringify({dest, date: Date.now()}));
        }
        if (stored) {
            document.getElementById('intel-layer').style.display = 'block';
            document.getElementById('intel-layer').innerText = `📍 ${stored.dest}: Manners & Tips Active`;
        }
        function breakBarrier() {
            let count = parseInt(localStorage.getItem('glb_api_count') || 0);
            if (count >= limit) return alert("Limit Reached.");
            const val = document.getElementById('input').value;
            if(!val) return;
            document.getElementById('result').innerHTML = "Analyzing in Smile Friend Intelligence...<br><span style='font-size:0.7rem; color:#555;'>Maturing high-precision phrases (Waiting for 5)</span>";
            localStorage.setItem('glb_api_count', ++count);
            document.getElementById('counter').innerText = `Usage: ${count} / ${limit}`;
            document.getElementById('input').value = '';
        }
    </script>
</body>
</html>
