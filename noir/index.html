<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLB - OFF-LINE SMILE</title>
    <style>
        body { background: #000; color: #FFD700; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        /* ロゴボタンのスタイリング */
        .glb-logo-btn {
            background: url('image.png') no-repeat center; /* 親方のロゴを指定 */
            background-size: contain;
            width: 180px; height: 180px;
            border: none; cursor: pointer;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.3));
            transition: transform 0.1s;
        }
        .glb-logo-btn:active { transform: scale(0.9); }
        .input-area { width: 80%; max-width: 400px; height: 100px; background: #111; border: 2px solid #FFD700; color: #FFD700; padding: 10px; font-size: 1.2rem; border-radius: 8px; margin-bottom: 20px; outline: none; }
        .result-box { width: 80%; max-width: 400px; min-height: 50px; border-left: 3px solid #FFD700; padding: 10px; font-size: 1.1rem; color: #FFF; background: rgba(255, 215, 0, 0.05); }
    </style>
</head>
<body>
    <textarea class="input-area" id="input" placeholder="TYPE HERE..."></textarea>
    
    <button class="glb-logo-btn" onclick="execute()"></button>

    <div class="result-box" id="output">STATUS: LOCAL_READY</div>

    <script>
        async function execute() {
            const text = document.getElementById('input').value;
            const output = document.getElementById('output');
            
            // オフライン判定・ローカル辞書チェック
            // server.js の localDict にステラが待機している想定
            output.innerText = "SMILE SEARCHING...";
            
            try {
                const res = await fetch('http://127.0.0.1:8080/translate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text: text, mode: 'offline_smile' })
                });
                const data = await res.json();
                output.innerText = data.result;
            } catch (e) {
                // 完全切断時のノワール・フォールバック
                output.innerText = "OFFLINE: USE STORED DICTIONARY";
            }
        }
    </script>
</body>
</html>
