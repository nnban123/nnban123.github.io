<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL LANGUAGE BREAKER</title>
    <style>
        body { background: #000; color: #FFD700; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .title { font-size: 1.5rem; font-weight: 900; letter-spacing: 0.5rem; margin-bottom: 2rem; text-shadow: 0 0 10px rgba(255, 215, 0, 0.4); }
        
        /* 執行ボタン：icon.png を使用 */
        .glb-btn {
            width: 220px; height: 220px;
            background: url('icon.png') no-repeat center;
            background-size: contain;
            border: none; cursor: pointer;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.2));
            transition: transform 0.1s;
            margin-bottom: 2rem;
        }
        .glb-btn:active { transform: scale(0.95); filter: drop-shadow(0 0 5px #FFD700); }

        .input-box { 
            width: 85%; max-width: 500px; height: 100px; background: #0a0a0a; 
            border: 2px solid #FFD700; padding: 1rem; color: #FFD700; 
            font-size: 1.4rem; border-radius: 10px; outline: none; text-align: center;
        }
        .result-box { 
            width: 85%; max-width: 500px; min-height: 80px; margin-top: 1.5rem; 
            border-left: 5px solid #FFD700; padding: 1rem; 
            background: rgba(255, 215, 0, 0.05); color: #FFF; font-size: 1.3rem; 
        }
    </style>
</head>
<body>
    <div class="title">GLOBAL LANGUAGE BREAKER</div>
    
    <textarea class="input-box" id="userInput" placeholder="INPUT JAPANESE..."></textarea>
    
    <button class="glb-btn" onclick="executeGLB()"></button>
    
    <div class="result-box" id="resultArea">READY...</div>

    <script>
        async function executeGLB() {
            const text = document.getElementById('userInput').value.trim();
            const resArea = document.getElementById('resultArea');
            if(!text) return;

            resArea.style.color = "#FFD700";
            resArea.innerText = "SMILE_PROCESSING...";

            try {
                // ターゲットは Smile Friend 8080ポート直結
                const response = await fetch('http://127.0.0.1:8080/translate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        text: text, 
                        mode: 'strict',
                        from: 'ja',
                        to: 'en'
                    })
                });
                
                const data = await response.json();
                // 親方の server.js が返す result を表示
                resArea.style.color = "#FFF";
                resArea.innerText = data.result;
            } catch (e) {
                resArea.style.color = "#F00";
                resArea.innerText = "Smile_ERROR:UNREACHABLE";
            }
        }
    </script>
</body>
</html>
