<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP ACCESS | GLB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .gold-glow { border: 1px solid #D4AF37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-lg">
        <div class="mb-8 text-center">
            <h1 class="text-2xl font-bold tracking-tighter text-[#D4AF37]">GLB PREMIUM ACTIVATED</h1>
            <p class="text-gray-500 text-[10px] uppercase mt-2">Unlimited translation mode is now live.</p>
        </div>

        <div class="bg-white/5 p-6 rounded-2xl gold-glow">
            <textarea id="vipInput" rows="5" placeholder="Enter text for high-speed translation..." 
                class="w-full bg-transparent border-none text-white text-lg focus:outline-none resize-none mb-4"></textarea>
            
            <button onclick="runVip()" class="w-full py-4 bg-[#D4AF37] text-black font-black rounded-xl uppercase hover:opacity-90 transition">
                Execute Translation
            </button>
            
            <div id="resultBox" class="mt-6 p-4 bg-white/10 rounded-xl hidden text-[#D4AF37] border-l-2 border-[#D4AF37]">
                </div>
        </div>

        <div class="mt-10 flex justify-between items-center opacity-30 text-[8px] uppercase tracking-[0.2em]">
            <span>Secured by Tomori Engine</span>
            <a href="index.html" class="hover:underline">Dashboard</a>
        </div>
    </div>

    <script>
        function runVip() {
            const input = document.getElementById('vipInput').value;
            const res = document.getElementById('resultBox');
            if(!input) return;
            res.classList.remove('hidden');
            res.innerText = "Processing... (Connecting to Tomori Engine)";
            // ここにパパの翻訳APIを繋ぎます
        }
    </script>
</body>
</html>
