<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GLB - TERMINAL</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .intel { background: #D4AF37; color: #000; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: none; font-weight: 900; }
        input { width: 90%; max-width: 400px; padding: 20px; background: #111; border: 1px solid #D4AF37; color: #fff; border-radius: 15px; font-size: 1.2rem; outline: none; }
        #result { margin-top: 30px; text-align: left; max-width: 400px; margin: 30px auto; color: #D4AF37; line-height: 1.8; }
        .offline-tip { font-size: 0.8rem; color: #D4AF37; margin-top: 20px; border: 1px dashed #D4AF37; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="intel-layer" class="intel">🛡️ TRAVEL MODE ACTIVE</div>
    <div style="margin-top: 40px;">
        <input type="text" id="input" placeholder="Type word..." onkeydown="if(event.key==='Enter') breakBarrier()">
        <p id="counter" style="font-size: 0.7rem; color: #555; margin-top: 10px;"></p>
    </div>
    <div id="result"></div>
    <div class="offline-tip">🆘 SOS: "Help me", "Hospital", "Police"</div>

    <script>
        const plan = new URLSearchParams(window.location.search).get('plan');
        const limit = (plan === 'travel' || plan === 'premium') ? 300 : 30;

        // 旅行モード：1ヶ月限定情報の提示
        let intel = JSON.parse(localStorage.getItem('glb_intel'));
        if (plan === 'travel' && (!intel || (Date.now() - intel.date > 30 * 24 * 60 * 60 * 1000))) {
            const dest = prompt("Enter Destination:");
            if(dest) {
                intel = { dest, date: Date.now(), tips: "Manners & Tips: Loading from ne-gateway..." };
                localStorage.setItem('glb_intel', JSON.stringify(intel));
            }
        }
        if (intel && (Date.now() - intel.date < 30 * 24 * 60 * 60 * 1000)) {
            document.getElementById('intel-layer').style.display = 'block';
            document.getElementById('intel-layer').innerText = `📍 ${intel.dest}: Tips & Manners Loaded`;
        }

        function breakBarrier() {
            let count = parseInt(localStorage.getItem('glb_api_count') || 0);
            if (count >= limit) return alert("Limit Reached.");
            const val = document.getElementById('input').value;
            if(!val) return;

            // ブラックボックス熟成待機
            document.getElementById('result').innerHTML = "Analyzing in Smile Friend Intelligence...<br><span style='font-size:0.7rem; color:#555;'>Maturing high-precision phrases...</span>";
            
            // 学習帳へ保存
            localStorage.setItem('dic_' + val, val);
            localStorage.setItem('glb_api_count', ++count);
            document.getElementById('counter').innerText = `Usage: ${count} / ${limit}`;
            document.getElementById('input').value = '';
        }
    </script>
</body>
</html>
