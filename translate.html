<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLB TRANSLATE | NEXT BASE</title>
  <style>
    body { background: #000; color: #f3f3f3; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .app-card { width: 90%; max-width: 400px; text-align: center; }
    .input-box { width: 100%; height: 120px; background: #111; border: 1px solid #ffd978; border-radius: 12px; color: #fff; padding: 15px; font-size: 18px; box-sizing: border-box; margin-bottom: 20px; outline: none; }
    .output-box { width: 100%; min-height: 120px; background: #050505; border: 1px dashed #666; border-radius: 12px; color: #ffd978; padding: 15px; font-size: 20px; box-sizing: border-box; text-align: left; margin-bottom: 30px; }
    .btn-trans { width: 100%; background: #ffd978; color: #000; padding: 20px; border: none; border-radius: 12px; font-size: 20px; font-weight: 900; cursor: pointer; box-shadow: 0 0 20px rgba(224, 184, 93, 0.3); }
    .label { font-size: 12px; color: #69f0ff; letter-spacing: 0.2em; margin-bottom: 8px; text-transform: uppercase; text-align: left; width: 100%; }
  </style>
</head>
<body>

  <div class="app-card">
    <div class="label">Input (Meaning)</div>
    <textarea class="input-box" id="inputText" placeholder="ここに伝えたい意味を入力..."></textarea>
    
    <button class="btn-trans" onclick="executeLogic()">CONVERT TO GLOBAL</button>

    <div class="label" style="margin-top: 30px;">Output (Friend Side)</div>
    <div class="output-box" id="outputText">意味がここに生成されます...</div>
    
    <p style="font-size: 11px; color: #444; margin-top: 20px;">$2.99 TIER / SMILE-FRIEND CONNECTED</p>
  </div>

  <script>
    // 演算ロジック：文法を捨て、意味を抽出して再構築する
    function executeLogic() {
      const input = document.getElementById('inputText').value;
      const output = document.getElementById('outputText');
      
      if(!input) return;

      output.innerText = "Processing...";
      
      // ここにトモリのコアロジック（簡易版）を直結
      setTimeout(() => {
        // 本来はAPI連携するが、まずは「動く1」を出すために即時変換
        output.innerText = input + " [Meaning Optimized]";
      }, 500);
    }
  </script>

</body>
</html>
