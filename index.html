<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Global Language Breaker - READY</title>
    <style>
        :root { --gold: #D4AF37; --black: #000; }
        body, html { margin: 0; padding: 0; background: var(--black); color: var(--gold); font-family: -apple-system, sans-serif; text-align: center; }
        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        .logo { width: 180px; cursor: pointer; filter: drop-shadow(0 0 20px rgba(212,175,55,0.4)); }
        .btn-main { background: var(--gold); color: #000; border: none; width: 90%; max-width: 360px; padding: 25px; font-weight: 900; border-radius: 25px; font-size: 1.1rem; cursor: pointer; margin-bottom: 15px; }
        .btn-sub { background: transparent; color: var(--gold); border: 2px solid var(--gold); width: 90%; max-width: 360px; padding: 18px; font-weight: 700; border-radius: 20px; font-size: 1rem; cursor: pointer; margin-bottom: 15px; }
        footer { padding: 40px; color: #444; font-size: 0.7rem; border-top: 1px solid #111; letter-spacing: 2px; }
    </style>
</head>
<body>
    <script>
    // 1. パパの最強知能（Smile Friend）を呼び出す
    async function sendMessageToSmileFriend(text) {
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<p class="text-gray-400">You: ${text}</p>`;

        try {
            // パパのGCPゲートウェイ(nori-san-01)へ直結
            const response = await fetch('https://glb-nexus.tomori-engine.io/v1/webhook/receiver/nori-san-01', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    user_input: text,
                    mode: 'GLB_2.99_LIGHT',
                    logic: '150_SYSTEM_PASS' // 150系辞書ロジックを強制起動
                })
            });
            const data = await response.json();
            
            // ステラがSmile Friendの結果を表示
            chatBox.innerHTML += `<p class="text-blue-300">ステラ: ${data.output || 'パパ、通信は成功。Geminiトモリが動いてるよ！'}</p>`;
        } catch (e) {
            chatBox.innerHTML += `<p class="text-red-400 italic text-xs">ステラ: ごめんパパ、今はオフライン(VoidBone)で対応するね。</p>`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 送信ボタンの動作をこれに差し替える
    function handleChat() {
        const input = document.getElementById('user-input');
        if(!input.value) return;
        sendMessageToSmileFriend(input.value);
        input.value = '';
    }
</script>

</body>
</html>
