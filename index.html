<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLB</title>
    <style>
        /* 🚨 全画面・スクロール禁止 🚨 */
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; position: fixed;
        }

        /* 🚨 どんな比率でも画面を埋め尽くす 🚨 */
        #gate-video { 
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover; /* 隙間を許さない */
            z-index: 500;
        }
        
        /* アプリUI：セーフエリアを考慮した配置 */
        #main-ui { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: 600; opacity: 0; pointer-events: none; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: space-around; 
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            background: #000; transition: opacity 0.4s ease;
        }
        #main-ui.active { opacity: 1; pointer-events: auto; }

        .breaker-btn { width: 110px; height: 110px; background: url('icon_s.png') no-repeat center center; background-size: contain; flex-shrink: 0; }
        .lang-select { background: #000; border: 1px solid #D4AF37; color: #D4AF37; padding: 12px; border-radius: 6px; font-size: 16px; width: 120px; text-align: center; }
    </style>
</head>

<body onclick="terminateGate()">

    <video id="gate-video" autoplay muted playsinline loop>
        <source src="door.mp4" type="video/mp4">
    </video>

    <div id="main-ui">
        <div style="width: 100%; max-width: 340px; font-size: 13px; line-height: 1.6; text-align: left; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px;">
            <b>[NB_001_PROTO]</b><br>
            Google API 2026/4/1 制限対応。15万語の核知能。2.99ドルの実弾で、高精度翻訳を解放します。
        </div>

        <div style="display:flex; gap:10px;">
            <select class="lang-select"><option>日本語</option><option>English</option></select>
            <select class="lang-select"><option>English</option><option>日本語</option></select>
        </div>

        <div class="breaker-btn" onclick="goToStripe(event)"></div>
        
        <div style="font-size:9px; opacity:0.3; letter-spacing:3px;">VOIDBONE // GLOBAL_LANGUAGE_BREAKER</div>
    </div>

    <script>
        const video = document.getElementById('gate-video');
        const mainUI = document.getElementById('main-ui');

        function terminateGate() {
            video.style.display = 'none';
            mainUI.classList.add('active');
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function goToStripe(e) {
            e.stopPropagation();
            window.location.href = "https://buy.stripe.com/bJedRbefH5yogzZfuDasg09";
        }
    </script>
</body>
</html>
