<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <title>GLB - Simple & Powerful Translation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #D4AF37; --black: #050505; }
        body { background: var(--black); color: white; font-family: -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); }
        .btn-gold { background: var(--gold); color: black; font-weight: 900; transition: all 0.2s; }
        .btn-gold:active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen px-5 pb-10">

    <header class="py-12 text-center">
        <h1 class="text-5xl font-black italic tracking-tighter mb-1">GLB</h1>
        <p class="text-[9px] tracking-[0.4em] text-[#D4AF37] font-bold">GLOBAL LANGUAGE BREAKER</p>
    </header>

    <main class="w-full max-w-md space-y-6 flex-1">
        <section class="glass p-8 rounded-[2rem] text-center shadow-xl">
            <p class="text-xs font-bold text-gray-500 mb-4 uppercase tracking-widest">Premium Access</p>
            <div class="flex justify-center items-baseline gap-1 mb-6">
                <span class="text-6xl font-black">$2.99</span>
                <span class="text-sm text-gray-500">/mo</span>
            </div>
            <a href="https://buy.stripe.com/bJedRbefH5yogzZfuDasg09" class="block w-full py-5 btn-gold rounded-xl text-xl shadow-lg">
                UNLOCK NOW
            </a>
            <p class="text-[11px] text-gray-400 mt-5 leading-relaxed">
                Enjoy unlimited high-quality translation.<br>Simple, fast, and secure.
            </p>
        </section>

        <section class="glass p-5 rounded-[2rem] flex flex-col h-[380px]">
            <div id="chat-box" class="flex-1 overflow-y-auto p-2 space-y-4 text-sm">
                <div class="flex justify-start">
                    <p class="bg-white/5 border border-white/10 p-4 rounded-2xl text-gray-400">
                        Ready. Enter text to translate.
                    </p>
                </div>
            </div>
            
            <div class="mt-4 flex gap-2">
                <input id="user-input" type="text" class="flex-1 bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-[#D4AF37]" placeholder="Type here...">
                <button onclick="handleChat()" class="bg-white text-black px-6 py-4 rounded-xl font-bold">GO</button>
            </div>
        </section>
    </main>

    <footer class="w-full max-w-md mt-10">
        <div class="grid grid-cols-3 gap-2 mb-8">
            <a href="/terms.html" class="glass py-3 rounded-lg text-[10px] text-center font-bold text-gray-400 uppercase tracking-tighter">Terms</a>
            <a href="/privacy.html" class="glass py-3 rounded-lg text-[10px] text-center font-bold text-gray-400 uppercase tracking-tighter border-[#D4AF37]/30">Privacy</a>
            <a href="/support.html" class="glass py-3 rounded-lg text-[10px] text-center font-bold text-gray-400 uppercase tracking-tighter">Support</a>
        </div>
        <p class="text-[8px] text-gray-800 text-center tracking-[0.3em]">© 2026 NEXTBASE ONE</p>
    </footer>

    <script>
    async function sendMessage(text) {
        const chatBox = document.getElementById('chat-box');
        const today = new Date().toLocaleDateString();
        let stats = JSON.parse(localStorage.getItem('glb_usage') || '{"date":"","count":0}');
        if (stats.date !== today) stats = {date: today, count: 0};

        if (stats.count >= 3) {
            chatBox.innerHTML += `<div class="flex justify-start"><p class="bg-[#D4AF37]/10 border border-[#D4AF37]/20 p-4 rounded-2xl text-[#D4AF37]">Daily limit reached. Please UNLOCK for more.</p></div>`;
            return;
        }

        chatBox.innerHTML += `<div class="flex justify-end"><p class="bg-white/10 p-4 rounded-2xl text-white max-w-[85%]">${text}</p></div>`;

        try {
            const response = await fetch('https://glb-nexus.tomori-engine.io/v1/webhook/receiver/nori-san-01', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_input: text, mode: 'SIMPLE_TRANS' })
            });
            const data = await response.json();
            stats.count++;
            localStorage.setItem('glb_usage', JSON.stringify(stats));

            chatBox.innerHTML += `<div class="flex justify-start"><p class="bg-white/5 border border-white/10 p-4 rounded-2xl max-w-[85%] text-[#D4AF37]"><span class="text-white/20 text-[9px] block mb-1">GLB:</span>${data.output || 'Complete.'}</p></div>`;
        } catch (e) {
            chatBox.innerHTML += `<p class="text-gray-800 text-[10px] text-center italic mt-4">Connecting...</p>`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleChat() {
        const input = document.getElementById('user-input');
        if(!input.value) return;
        sendMessage(input.value);
        input.value = '';
    }
    document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleChat(); });
    </script>
</body>
</html>
