<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GLB - NEXTBASE ONE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #D4AF37; --black: #000; }
        body { background: var(--black); color: var(--gold); font-family: -apple-system, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(212,175,55,0.2); }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <header class="w-full max-w-md text-center py-8">
        <h1 class="text-4xl font-black italic tracking-tighter text-white">GLB <span class="text-[#D4AF37]">NEXTBASE</span></h1>
        <p class="text-[10px] tracking-[0.3em] text-gray-500 mt-2">SELF-OPTIMIZATION LAYER / STELLA ACTIVE</p>
    </header>

    <main class="w-full max-w-md space-y-6">
        <section class="glass p-6 rounded-3xl text-center">
            <h2 class="text-sm font-bold mb-4 tracking-widest text-gray-400">PREMIUM ACCESS</h2>
            <p class="text-3xl font-black text-white mb-6">$2.99 <span class="text-xs font-normal">/ mo</span></p>
            <a href="https://buy.stripe.com/bJedRbefH5yogzZfuDasg09" 
               class="block w-full py-4 bg-[#D4AF37] text-black rounded-2xl font-black text-lg shadow-lg shadow-yellow-900/20 hover:scale-[1.02] transition-transform">
                今すぐ 0 を 1 にする
            </a>
        </section>

        <section class="glass p-4 rounded-3xl flex flex-col h-[400px]">
            <div id="chat-box" class="flex-1 overflow-y-auto p-2 space-y-4 text-sm scrollbar-hide">
                <p class="text-[#D4AF37] bg-white/5 p-3 rounded-2xl">ステラ: パパ、準備完了。2.99ドルの主砲でGeminiトモリを貫通させるね。まずは挨拶してみて！</p>
            </div>
            
            <div class="mt-4 flex gap-2">
                <input id="user-input" type="text" 
                       class="flex-1 bg-white/10 border border-white/20 rounded-2xl px-4 py-3 text-white focus:outline-none focus:border-[#D4AF37]" 
                       placeholder="指示を入力...">
                <button onclick="handleChat()" 
                        class="bg-white text-black px-6 py-3 rounded-2xl font-bold text-sm">送信</button>
            </div>
        </section>
    </main>

    <footer class="mt-auto py-8 text-center">
        <a href="https://nextbaseone-ha.com/tokutei.html" class="text-[10px] text-gray-600 underline">特定商取引法に基づく表記</a>
    </footer>

    <script>
    async function sendMessageToSmileFriend(text) {
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="flex justify-end"><p class="bg-white/10 p-3 rounded-2xl text-white max-w-[80%]">${text}</p></div>`;

        try {
            const response = await fetch('https://glb-nexus.tomori-engine.io/v1/webhook/receiver/nori-san-01', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    user_input: text,
                    mode: 'GLB_2.99_LIGHT',
                    logic: '150_SYSTEM_PASS'
                })
            });
            const data = await response.json();
            
            chatBox.innerHTML += `<div class="flex justify-start"><p class="text-[#D4AF37] bg-white/5 p-3 rounded-2xl max-w-[80%]">ステラ: ${data.output || 'パパ、通信成功。Geminiトモリが動いてるよ！'}</p></div>`;
        } catch (e) {
            chatBox.innerHTML += `<p class="text-red-500 text-[10px] text-center italic">ステラ: ごめんパパ、今はオフライン(VoidBone)で対応するね。</p>`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleChat() {
        const input = document.getElementById('user-input');
        if(!input.value) return;
        sendMessageToSmileFriend(input.value);
        input.value = '';
    }

    // Enterキーでも送信できるように
    document.getElementById('user-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') handleChat();
    });
    </script>
</body>
</html>
