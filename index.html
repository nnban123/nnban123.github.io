<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLB</title>
    <style>
        /* 🚨 物理的な揺れを一切許さない固定設定 🚨 */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100dvh; /* 動的ビューポートでツールバー干渉を回避 */
            background: #000; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            position: fixed; /* スクロールを物理的に禁止 */
        }

        /* 🚨 自動調整の核心 🚨 */
        #gate-video {
            width: 100%; height: 100%;
            max-width: 100vw; max-height: 100dvh;
            /* 🚨 比率を維持し、画面内に必ず収める（無を許容） 🚨 */
            object-fit: contain; 
            z-index: 500;
        }

        /* アプリUI：動画が終わった後に浮かび上がる */
        #main-ui {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100dvh;
            z-index: 600; opacity: 0; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            box-sizing: border-box; background: #000;
        }
        #main-ui.active { opacity: 1; pointer-events: auto; }

        .breaker-btn { width: 100px; height: 100px; background: url('icon_s.png') no-repeat center center; background-size: contain; flex-shrink: 0; }
        .lang-select { background: #000; border: 1px solid #D4AF37; color: #D4AF37; padding: 10px; border-radius: 5px; width: 110px; text-align: center; font-size: 16px; }
    </style>
</head>

<body onclick="terminateGate()">

    <video id="gate-video" autoplay muted playsinline loop>
        <source src="door.mp4" type="video/mp4">
    </video>

    <div id="main-ui">
        <div style="width: 100%; max-width: 320px; font-size: 13px; color: #fff; line-height: 1.6; text-align: left; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px;">
            <b>[NB_001_PROTO]</b><br>
            Google API 2026/4/1 制限対応。15万語の核知能。2.99ドルの実弾で、高精度翻訳を解放。
        </div>

        <div style="display:flex; gap:10px;">
            <select class="lang-select"><option>日本語</option><option>English</option></select>
            <select class="lang-select"><option>English</option><option>日本語</option></select>
        </div>

        <div class="breaker-btn" onclick="goToStripe(event)"></div>
        <div style="font-size:9px; opacity:0.3; letter-spacing:3px;">VOIDBONE // GLB</div>
    </div>

    <script>
        const video = document.getElementById('gate-video');
        const mainUI = document.getElementById('main-ui');

        function terminateGate() {
            video.style.display = 'none';
            mainUI.classList.add('active');
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function goToStripe(e) {
            e.stopPropagation();
            window.location.href = "https://buy.stripe.com/bJedRbefH5yogzZfuDasg09";
        }
    </script>
</body>
</html>
