<!DOCTYPE html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXTBASE GLB</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* Scene 1: Video Gate */
        #video-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 100; cursor: pointer; transition: 0.8s; }

        /* Scene 2: Central Hub (上下の無を完全に維持) */
        #hub { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; z-index: 10; opacity: 0; transition: 1.5s; }
        .logo-trigger { width: 60vw; max-width: 220px; aspect-ratio: 1/1; background: url('icon.png') no-repeat center; background-size: contain; cursor: pointer; filter: drop-shadow(0 0 40px rgba(255,204,0,0.4)); transition: 0.3s; }
        .logo-trigger:active { transform: scale(0.95); }
        .ready-text { color: #ffcc00; letter-spacing: 15px; font-size: 1.3rem; margin-top: 30px; font-weight: 900; text-indent: 15px; }
        .sub-text { color: #111; letter-spacing: 6px; font-size: 0.6rem; margin-top: 10px; font-weight: 600; text-transform: uppercase; }

        /* Scene 3: Dashboard Overlay (ENGLISH ONLY) */
        #dashboard { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 200; padding: 40px 20px; flex-direction: column; align-items: center; justify-content: center; }
        .menu-frame { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 15px; text-align: center; }
        .label { color: #ffcc00; font-size: 0.7rem; letter-spacing: 8px; margin-bottom: 20px; font-weight: 900; }
        
        #usage-info { color: #444; font-size: 0.6rem; letter-spacing: 3px; margin-bottom: 10px; text-transform: uppercase; }

        .m-btn { background: #ffcc00; color: #000; padding: 22px; font-weight: 900; border: none; letter-spacing: 4px; cursor: pointer; text-transform: uppercase; font-size: 1rem; transition: 0.2s; }
        .m-btn.white { background: #fff; border: 2px solid #ffcc00; }

        .shields { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; margin-top: 50px; }
        .shields a { color: #444; text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 600; }
        
        .close-hub { margin-top: 40px; color: #ffcc00; cursor: pointer; letter-spacing: 8px; font-size: 0.8rem; font-weight: 900; }
        .sig { position: absolute; bottom: 40px; color: #080808; letter-spacing: 12px; font-size: 0.6rem; font-weight: 900; }
    </style>
</head>
<body>

    <video id="video-gate" autoplay muted playsinline onclick="enter()">
        <source src="door.mp4" type="video/mp4">
    </video>

    <div id="hub">
        <div class="logo-trigger" onclick="openDash()"></div>
        <div class="ready-text">READY</div>
        <div class="sub-text">GLOBAL LANGUAGE BREAKER</div>
        <div class="sig">SMILE / FRIEND</div>
    </div>

    <div id="dashboard">
        <div class="menu-frame">
            <div class="label">DASHBOARD</div>
            <div id="usage-info">FREE ACCESS: <span id="count-num">3</span>/3 LEFT</div>
            
            <button class="m-btn" onclick="launchBreaker()">OPEN BREAKER</button>
            
            <button class="m-btn white" onclick="window.open('https://buy.stripe.com/bJedRbefH5yogzZfuDasg09', '_blank')">ACTIVATE ($2.99/mo)</button>
            
            <div class="shields">
                <a href="support.html">Support</a>
                <a href="privacy.html">Privacy</a>
                <a href="terms.html">Terms</a>
                <a href="legal.html">Legal</a>
            </div>
            
            <div class="close-hub" onclick="closeDash()">[ CLOSE ]</div>
        </div>
    </div>

    <script>
        const v = document.getElementById('video-gate');
        const h = document.getElementById('hub');
        const d = document.getElementById('dashboard');
        const countDisplay = document.getElementById('count-num');

        let usage = localStorage.getItem('glb_usage') ? parseInt(localStorage.getItem('glb_usage')) : 0;
        let isPaid = localStorage.getItem('glb_paid') === 'true';

        function updateUI() {
            if (isPaid) {
                document.getElementById('usage-info').innerText = "FULL ACCESS ACTIVE";
            } else {
                countDisplay.innerText = Math.max(0, 3 - usage);
            }
        }

        function enter() {
            v.style.opacity = '0';
            setTimeout(() => {
                v.style.display = 'none';
                h.style.display = 'flex';
                setTimeout(() => { h.style.opacity = '1'; }, 100);
            }, 800);
        }

        v.onended = enter;
        function openDash() { updateUI(); d.style.display = 'flex'; }
        function closeDash() { d.style.display = 'none'; }

        function launchBreaker() {
            if (!isPaid && usage >= 3) {
                alert("Trial ended. Please activate Full Access.");
                openDash();
                return;
            }
            if (!isPaid) {
                usage++;
                localStorage.setItem('glb_usage', usage);
            }
            // nnban123.github.io/noir/ へ飛ばす
            window.location.href = './noir/';
        }
        updateUI();
    </script>
</body>
</html>
