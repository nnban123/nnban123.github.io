<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLB | NEXT BASE</title>
  <style>
    /* 全体設定 */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* スクロール禁止 */
      background-color: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* 動画を背景に固定 */
    .video-background {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      z-index: -1;
      transform: translate(-50%, -50%);
    }

    /* 前面のコンテンツレイヤー */
    .overlay {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between; /* 上下中央に配置 */
      align-items: center;
      background: rgba(0, 0, 0, 0.3); /* 動画を少し暗くして視認性アップ */
      padding: 60px 0;
      box-sizing: border-box;
    }

    /* ロゴ */
    .logo-img {
      width: 120px;
      height: auto;
      filter: drop-shadow(0 0 15px rgba(255, 217, 120, 0.5));
    }

    /* 中央のメインエリア */
    .main-box {
      text-align: center;
    }

    .main-title {
      font-size: 72px;
      font-weight: 900;
      color: #fff;
      margin: 0;
      letter-spacing: 0.2em;
      text-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    /* STARTボタン：絶対にクリック可能に */
    .btn-start {
      display: inline-block;
      margin-top: 30px;
      background: #ffd978; /* gold-2 */
      color: #000;
      padding: 20px 80px;
      font-size: 24px;
      font-weight: 900;
      text-decoration: none;
      border-radius: 50px;
      box-shadow: 0 0 30px rgba(255, 217, 120, 0.6);
      transition: transform 0.2s;
    }

    .btn-start:hover {
      transform: scale(1.1);
      background: #fff;
    }

    .price-tag {
      color: #69f0ff; /* neon */
      font-weight: bold;
      margin-top: 15px;
      letter-spacing: 0.1em;
    }

    /* フッターリンク */
    .footer-nav {
      display: flex;
      gap: 20px;
    }

    .footer-nav a {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <video autoplay loop muted playsinline class="video-background">
    <source src="door.mp4" type="video/mp4">
  </video>

  <div class="overlay">
    <img src="icon.png" alt="GLB Logo" class="logo-img"> <div class="main-box">
      <h1 class="main-title">GLB</h1>
      <a href="translate.html" class="btn-start">START</a> <p class="price-tag">$2.99 / One-time Access</p>
    </div>

    <nav class="footer-nav">
      <a href="support.html">Support</a>
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
      <a href="legal.html">Legal</a>
    </nav>
  </div>

</body>
</html>
