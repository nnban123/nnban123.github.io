<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>GLB | NEXT BASE</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* 演出を捨て、機能と高級感に特化 */
    body {
      background: var(--bg);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--text);
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 40px 20px;
      width: 100%;
      max-width: 400px;
    }

    .icon-box {
      margin-bottom: 30px;
    }

    .icon-img {
      width: 100px;
      height: auto;
      filter: drop-shadow(var(--shadow-gold));
    }

    .brand-title {
      font-size: 64px;
      font-weight: 900;
      letter-spacing: 0.1em;
      margin: 0;
      background: linear-gradient(135deg, #fff 0%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .description {
      color: var(--muted);
      font-size: 16px;
      margin: 20px 0 40px;
      line-height: 1.6;
    }

    /* 最優先：確実に押せるSTARTボタン */
    .btn-main {
      display: block;
      background: var(--gold-2);
      color: #000;
      padding: 22px;
      font-size: 24px;
      font-weight: 900;
      text-decoration: none;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-gold);
      letter-spacing: 0.1em;
      transition: 0.3s;
    }

    .btn-main:hover {
      transform: translateY(-3px);
      background: #fff;
    }

    .price-tag {
      margin-top: 20px;
      color: var(--neon);
      font-weight: bold;
      font-size: 14px;
      letter-spacing: 0.2em;
    }

    .footer-nav {
      position: absolute;
      bottom: 40px;
      display: flex;
      gap: 20px;
    }

    .footer-nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="icon-box">
      <img src="icon.png" alt="GLB" class="icon-img">
    </div>
    
    <h1 class="brand-title">GLB</h1>
    <p class="description">
      Meaning, Delivered.<br>
      Professional Translation Gateway.
    </p>

    <a href="translate.html" class="btn-main">START</a>
    <p class="price-tag">$2.99 / One-time Access</p>
  </div>

  <nav class="footer-nav">
    <a href="support.html">Support</a>
    <a href="privacy.html">Privacy</a>
    <a href="terms.html">Terms</a>
    <a href="legal.html">Legal</a>
  </nav>

</body>
</html>
