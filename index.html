<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GLB - Global Language Breaker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #D4AF37; --black: #050505; }
        body { background: var(--black); color: white; font-family: 'Inter', sans-serif; letter-spacing: -0.02em; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
        .btn-premium { background: var(--gold); color: black; transition: all 0.2s ease; }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(212,175,55,0.3); }
    </style>
</head>
<body class="p-6 flex flex-col items-center min-h-screen">

    <header class="w-full max-w-md text-center py-12">
        <h1 class="text-6xl font-black italic tracking-tighter mb-2">GLB</h1>
        <p class="text-[10px] tracking-[0.5em] text-[#D4AF37] font-bold">GLOBAL LANGUAGE BREAKER</p>
    </header>

    <main class="w-full max-w-md space-y-8">
        <section class="glass p-8 rounded-[2.5rem] text-center">
            <h2 class="text-[10px] font-bold mb-6 tracking-[0.2em] text-gray-500 uppercase">Premium Intelligence Access</h2>
            <p class="text-5xl font-black mb-8">$2.99<span class="text-sm font-light text-gray-500 italic"> / month</span></p>
            
            <a href="https://buy.stripe.com/bJedRbefH5yogzZfuDasg09" 
               class="block w-full py-6 btn-premium rounded-2xl font-black text-xl mb-4">
                UNLOCK NOW
            </a>
            <p class="text-[11px] text-gray-400 leading-relaxed px-4">
                Break the limits of conventional translation. <br>
                Direct thought-to-language processing.
            </p>
        </section>

        <section class="glass p-5 rounded-[2.5rem] flex flex-col h-[380px]">
            <div id="chat-box" class="flex-1 overflow-y-auto p-2 space-y-4 text-sm scrollbar-hide">
                <div class="flex justify-start">
                    <p class="bg-white/5 border border-white/10 p-4 rounded-2xl text-gray-300">
                        System ready. Input text to break the language barrier.
                    </p>
                </div>
            </div>
            
            <div class="mt-4 flex gap-2">
                <input id="user-input" type="text" 
                       class="flex-1 bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-[#D4AF37]" 
                       placeholder="Type here...">
                <button onclick="handleChat()" 
                        class="bg-white text-black px-6 py-4 rounded-xl font-bold text-xs">GO</button>
            </div>
        </section>
    </main>

    <footer class="mt-auto py-10 w-full text-center">
        <div class="flex justify-center gap-6 text-[10px] text-gray-600 uppercase tracking-widest font-medium">
            <a href="/terms.html" class="hover:text-gray-400">Terms</a>
            <a href="/privacy.html" class="hover:text-gray-400">Privacy</a>
            <a href="/support.html" class="hover:text-gray-400">Support</a>
        </div>
    </footer>

    <script>
    async function sendMessage(text) {
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="flex justify-end"><p class="bg-white/10 p-4 rounded-2xl text-white max-w-[85%]">${text}</p></div>`;

        try {
            const response = await fetch('https://glb-nexus.tomori-engine.io/v1/webhook/receiver/nori-san-01', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    user_input: text,
                    mode: 'GLB_GLOBAL',
                    logic: '150_SYSTEM'
                })
            });
            const data = await response.json();
            
            chatBox.innerHTML += `<div class="flex justify-start"><p class="bg-white/5 border border-white/10 p-4 rounded-2xl max-w-[85%] text-[#D4AF37]">${data.output || 'Processing complete.'}</p></div>`;
        } catch (e) {
            chatBox.innerHTML += `<p class="text-gray-600 text-[10px] text-center italic mt-2">Offline redundancy active.</p>`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleChat() {
        const input = document.getElementById('user-input');
        if(!input.value) return;
        sendMessage(input.value);
        input.value = '';
    }

    document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleChat(); });
    </script>
</body>
</html>
