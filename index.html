<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXTBASE GLB</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #video-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 100; cursor: pointer; }
        
        /* Scene: Central Hub */
        #main-ui { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; opacity: 0; transition: 1.5s; z-index: 10; }
        .logo-trigger { width: 220px; height: 220px; background: url('icon.png') no-repeat center; background-size: contain; cursor: pointer; filter: drop-shadow(0 0 20px rgba(255,204,0,0.4)); transition: 0.3s; }
        .logo-trigger:active { transform: scale(0.95); }
        .ready-text { color: #ffcc00; letter-spacing: 10px; font-size: 1.2rem; margin-top: 25px; font-weight: 900; }
        .sub-text { color: #333; letter-spacing: 5px; font-size: 0.6rem; margin-top: 10px; }

        /* Full Screen Settings (Overlay) */
        #settings-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; padding: 40px 20px; box-sizing: border-box; flex-direction: column; align-items: center; justify-content: center; }
        .menu-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .menu-btn { background: #ffcc00; color: #000; padding: 20px; font-weight: 900; border: none; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; font-size: 1rem; }
        .buy-btn { background: #fff; border: 2px solid #ffcc00; }
        
        .policy-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 40px; }
        .policy-links a { color: #666; text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }
        .close-trigger { margin-top: 30px; color: #ffcc00; cursor: pointer; letter-spacing: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <video id="video-gate" autoplay muted playsinline onclick="openGate()">
        <source src="door.mp4" type="video/mp4">
    </video>

    <div id="main-ui">
        <div class="logo-trigger" onclick="showMenu()"></div>
        <div class="ready-text">READY</div>
        <div class="sub-text">GLOBAL LANGUAGE BREAKER</div>
        <div style="position:absolute; bottom:40px; color:#111; letter-spacing:10px; font-size:0.6rem;">SMILE / FRIEND</div>
    </div>

    <div id="settings-overlay">
        <div class="menu-container">
            <div style="color:#ffcc00; font-size:0.7rem; letter-spacing:5px; margin-bottom:20px; text-align:center;">DASHBOARD</div>
            <button class="menu-btn" onclick="alert('Language: Auto-Detect')">LANGUAGE SETTING</button>
            <button class="menu-btn" onclick="location.href='https://nextbase-one-ha.github.io/noir/'">OPEN BREAKER</button>
            <button class="menu-btn buy-btn" onclick="alert('Checkout $2.99')">ACTIVATE FULL ACCESS ($2.99)</button>
            
            <div style="color:#555; font-size:0.7rem; line-height:1.6; text-align:center; margin-top:20px;">
                On-device engine. Minimal connection.<br>Verified by NEXTBASE.
            </div>

            <div class="policy-links">
                <a href="legal.html">Legal</a>
                <a href="terms.html">Terms</a>
                <a href="privacy.html">Privacy</a>
                <a href="support.html">Support</a>
            </div>
            <div class="close-trigger" onclick="hideMenu()">[ CLOSE ]</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-gate');
        const ui = document.getElementById('main-ui');
        const overlay = document.getElementById('settings-overlay');

        function openGate() {
            video.style.opacity = '0';
            setTimeout(() => {
                video.style.display = 'none';
                ui.style.display = 'flex';
                setTimeout(() => { ui.style.opacity = '1'; }, 50);
            }, 500);
        }

        video.onended = openGate;

        function showMenu() { overlay.style.display = 'flex'; }
        function hideMenu() { overlay.style.display = 'none'; }
    </script>
</body>
</html>
