<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GLB</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        /* 動画レイヤー */
        #gate-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 100; background: #000; }
        /* スキップボタン */
        #skip-btn { position: fixed; top: 20px; right: 20px; z-index: 200; padding: 12px 24px; border: 1px solid #D4AF37; color: #D4AF37; display: none; cursor: pointer; background: rgba(0,0,0,0.5); border-radius: 5px; }
        /* メインUI（最初は透明・クリック不可） */
        #main-ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
        #main-ui.active { z-index: 300; pointer-events: auto; opacity: 1; }
        .breaker-btn { width: 160px; height: 160px; background: url('icon.png') no-repeat center center; background-size: contain; cursor: pointer; }
        .status { margin-top: 20px; color: #D4AF37; letter-spacing: 5px; font-size: 12px; }
    </style>
</head>
<body onclick="startSequence()">

    <video id="gate-video" playsinline muted poster="icon.png">
        <source src="door.mp4" type="video/mp4">
    </video>
    <div id="skip-btn" onclick="terminateGate(event)">SKIP</div>

    <div id="main-ui">
        <div class="breaker-btn" onclick="goToStripe()"></div>
        <div class="status">READY</div>
    </div>

    <script>
        const video = document.getElementById('gate-video');
        const skipBtn = document.getElementById('skip-btn');
        const mainUI = document.getElementById('main-ui');

        function startSequence() {
            if (video.paused) {
                video.play().then(() => {
                    skipBtn.style.display = 'block';
                }).catch(err => terminateGate());
            }
        }

        video.onended = terminateGate;

        function terminateGate(e) {
            if(e) e.stopPropagation();
            video.style.display = 'none';
            skipBtn.style.display = 'none';
            mainUI.classList.add('active');
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function goToStripe() {
            window.location.href = "https://buy.stripe.com/bJedRbefH5yogzZfuDasg09";
        }
    </script>
</body>
</html>
